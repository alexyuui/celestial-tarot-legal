<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Tarot - Connecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #2d1b69 100%); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 50px; text-align: center; max-width: 500px; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #f5c542; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { margin-bottom: 10px; color: #f5c542; }
        p { color: #b8b8d4; }
        .error { color: #fe2c55; }
        .success { color: #25f4ee; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Connecting to TikTok...</h2>
        <p id="message">Please wait while we complete the authorization.</p>
    </div>
    <script>
        const API_BASE = 'https://67-230-168-132.sslip.io'; // Will update to VPS

        async function handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const savedState = sessionStorage.getItem('tiktok_csrf_state');

            if (error) {
                showError('Authorization was denied: ' + (params.get('error_description') || error));
                return;
            }
            if (!code) {
                showError('No authorization code received.');
                return;
            }
            if (state !== savedState) {
                showError('State mismatch. Please try again.');
                return;
            }

            try {
                const resp = await fetch(API_BASE + '/api/auth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                const data = await resp.json();
                if (data.access_token) {
                    sessionStorage.setItem('tiktok_access_token', data.access_token);
                    sessionStorage.setItem('tiktok_open_id', data.open_id || '');
                    sessionStorage.setItem('tiktok_display_name', data.display_name || 'Creator');
                    showSuccess('Connected! Redirecting to dashboard...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    showError(data.error || 'Failed to get access token.');
                }
            } catch (e) {
                showError('Server error: ' + e.message);
            }
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Connection Failed';
            document.getElementById('title').classList.add('error');
            document.getElementById('message').textContent = msg;
            document.getElementById('message').innerHTML += '<br><br><a href="index.html" style="color:#f5c542">← Try again</a>';
        }
        function showSuccess(msg) {
            document.getElementById('spinner').style.borderTopColor = '#25f4ee';
            document.getElementById('title').textContent = '✓ Connected!';
            document.getElementById('title').classList.add('success');
            document.getElementById('message').textContent = msg;
        }

        handleCallback();
    </script>
</body>
</html>
